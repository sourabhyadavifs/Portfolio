<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Definitions for filters and gradients -->
  <defs>
    <!-- Soft drop shadow for 3D depth -->
    <filter id="shadow" x="-15%" y="-15%" width="135%" height="135%">
      <feDropShadow dx="8" dy="18" stdDeviation="16" flood-color="#000000" flood-opacity="0.5" />
    </filter>

    <!-- Golden metallic gradient for chip and foil line -->
    <linearGradient id="gold-foil" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dfb74c" />
      <stop offset="30%" stop-color="#fbf1c7" />
      <stop offset="70%" stop-color="#dfb74c" />
      <stop offset="100%" stop-color="#b58915" />
    </linearGradient>

    <!-- Card background dark gradient -->
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e21" />
      <stop offset="60%" stop-color="#101012" />
      <stop offset="100%" stop-color="#060607" />
    </linearGradient>

    <!-- Premium gloss diagonal sheen -->
    <linearGradient id="sheen" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.08" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.14" />
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.08" />
      <stop offset="65%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>

    <!-- Mastercard left circle -->
    <linearGradient id="mc-left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff5f00" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#ff5f00" stop-opacity="0.85" />
    </linearGradient>

    <!-- Mastercard right circle -->
    <linearGradient id="mc-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f79e1b" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#f79e1b" stop-opacity="0.85" />
    </linearGradient>
  </defs>

  <!-- Solid Royal Blue Background -->
  <rect width="100%" height="100%" fill="#0d42bc" />

  <!-- Floating Tilted Card Container -->
  <g transform="translate(400, 295) rotate(-15) skewX(-18) scale(1.15)" filter="url(#shadow)">
    <!-- Base card shape (centered at 0,0) -->
    <!-- Card dimensions: 450x280. Center is at x=-225, y=-140 -->
    <rect x="-225" y="-140" width="450" height="280" rx="16" fill="url(#card-grad)" stroke="#2e2e31" stroke-width="1.2" />

    <!-- Top Gold Foil Line -->
    <line x1="-205" y1="-120" x2="205" y2="-120" stroke="url(#gold-foil)" stroke-width="1.5" />

    <!-- Contactless wave icon -->
    <g transform="translate(-195, -20) rotate(-90)" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.9">
      <path d="M -10,0 A 10,10 0 0,1 10,0" />
      <path d="M -15,5 A 16,16 0 0,1 15,5" />
      <path d="M -20,10 A 22,22 0 0,1 20,10" />
      <path d="M -25,15 A 28,28 0 0,1 25,15" />
    </g>

    <!-- Smart Chip -->
    <g transform="translate(-155, -35)">
      <!-- Base chip shape -->
      <rect x="0" y="0" width="50" height="40" rx="5" fill="url(#gold-foil)" stroke="#806212" stroke-width="0.75" />
      <!-- Chip grid lines -->
      <path d="M 12,0 L 12,40 M 25,0 L 25,40 M 38,0 L 38,40 M 0,14 L 50,14 M 0,26 L 50,26" stroke="#806212" stroke-width="0.75" fill="none" />
      <!-- Center pattern -->
      <rect x="18" y="10" width="14" height="20" rx="2" fill="none" stroke="#806212" stroke-width="0.75" />
    </g>

    <!-- creditplanner.in Title Text -->
    <text x="-82" y="-4" fill="#ffffff" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="33" font-weight="700" letter-spacing="-0.5" opacity="0.95">
      creditplanner<tspan fill="url(#gold-foil)">.in</tspan>
    </text>

    <!-- CIMATARD Subtext -->
    <text x="-80" y="70" fill="#a4a4ab" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="16" font-weight="500" letter-spacing="2" opacity="0.8">
      CIMATARD
    </text>

    <!-- Mastercard logo overlapping circles -->
    <g transform="translate(160, 55)">
      <!-- Left Circle -->
      <circle cx="-13" cy="0" r="21" fill="url(#mc-left)" />
      <!-- Right Circle -->
      <circle cx="13" cy="0" r="21" fill="url(#mc-right)" />
      <!-- Intersecting section effect -->
      <path d="M 0,-16.5 A 21,21 0 0,0 0,16.5 A 21,21 0 0,0 0,-16.5" fill="#f79e1b" opacity="0.85" />
    </g>

    <!-- Diagonal Sheen / Glossy Overlay -->
    <rect x="-225" y="-140" width="450" height="280" rx="16" fill="url(#sheen)" pointer-events="none" />
  </g>
</svg>
